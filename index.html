<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gassan & Tarez Engagement</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --dark: #1a1a1a;
            --white: #ffffff;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: #f9f9f9;
            color: var(--dark);
            text-align: center;
        }

        .section { padding: 40px 20px; max-width: 800px; margin: auto; }

        /* שעון ספירה לאחור מוגדל */
        .countdown-container {
            background: var(--dark);
            color: var(--white);
            padding: 60px 20px;
            margin-bottom: 40px;
        }

        #countdown {
            display: flex;
            justify-content: center;
            gap: 15px;
            font-family: 'Cinzel', serif;
        }

        .count-item {
            display: flex;
            flex-direction: column;
            min-width: 80px;
        }

        .count-number {
            font-size: 3.5rem; /* הגדלה משמעותית */
            font-weight: bold;
            color: var(--gold);
            line-height: 1;
        }

        .count-label {
            font-size: 0.8rem;
            color: #aaa;
            text-transform: uppercase;
            margin-top: 10px;
            letter-spacing: 2px;
        }

        .main-img {
            width: 100%;
            max-width: 1080px;
            border-radius: 5px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.1);
        }

        .logoCH { max-width: 200px; margin: 40px 0 20px; }

        .rsvp-form { 
            background: white; 
            padding: 40px; 
            border-radius: 10px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            direction: rtl;
            margin-top: 40px;
        }

        input, select, button { 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            border: 1px solid #ddd; 
            border-radius: 5px; 
            font-size: 1rem;
        }

        button { 
            background-color: var(--gold); 
            color: white; 
            font-weight: bold; 
            border: none; 
            cursor: pointer;
            font-size: 1.2rem;
        }

        iframe { width: 100%; height: 400px; border: 0; border-radius: 10px; margin-top: 20px; }

        h2 { font-family: 'Cinzel', serif; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="countdown-container">
        <h2 style="color: var(--gold); margin-bottom: 30px;">COUNTING DOWN TO THE BIG DAY</h2>
        <div id="countdown">
            <div class="count-item">
                <span class="count-number" id="days">00</span>
                <span class="count-label">Days</span>
            </div>
            <div class="count-item">
                <span class="count-number" id="hours">00</span>
                <span class="count-label">Hours</span>
            </div>
            <div class="count-item">
                <span class="count-number" id="minutes">00</span>
                <span class="count-label">Mins</span>
            </div>
            <div class="count-item">
                <span class="count-number" id="seconds">00</span>
                <span class="count-label">Secs</span>
            </div>
        </div>
    </div>

    <div class="section">
        <img src="img2.png" alt="Gassan & Tarez" class="main-img">
    </div>

    <div class="section">
        <img src="logoCH.png" alt="Venue Logo" class="logoCH">
        <h3 style="font-family: 'Cinzel';">THE VENUE</h3>
        <p>הרב פרץ חיות 3, חיפה</p>
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3348.675123456789!2d34.987654321!3d32.789012345!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x151dba46222c5453%3A0x6789abcd1234567!2z16vXm9eRINek16jXpSDXl9eZ15XXqiAzLCDXl9eZ16TXlA!5e0!3m2!1siw!2sil!4v1234567890123"></iframe>
    </div>

    <div class="section">
        <h2>We can’t wait to celebrate together!</h2>
        <p>Kindly complete the RSVP form below.</p>
        <form class="rsvp-form" id="rsvpForm">
            <label>الاسم الكامل *</label>
            <input type="text" id="name" required placeholder="הכנס שם מלא">
            
            <label>هل ستتمكن/ين من الحضور؟ *</label>
            <select id="attendance" required>
                <option value="כן, אני מגיע/ה">כן, אני מגיע/ה</option>
                <option value="לצערי לא אוכל להגיע">לצערי לא אוכל להגיע</option>
            </select>

            <label>عدد الأشخاص (כמות אנשים)</label>
            <input type="number" id="guests" min="1" value="1">

            <button type="submit">SUBMIT RSVP</button>
        </form>
    </div>

    <div class="section">
        <img src="final_design.png" alt="Design" style="width: 100%;">
    </div>

    <script>
        // Countdown Script
        const targetDate = new Date("April 21, 2026 19:00:00").getTime();

        const timer = setInterval(function() {
            const now = new Date().getTime();
            const diff = targetDate - now;

            document.getElementById("days").innerHTML = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById("hours").innerHTML = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("minutes").innerHTML = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById("seconds").innerHTML = Math.floor((diff % (1000 * 60)) / 1000);

            if (diff < 0) {
                clearInterval(timer);
                document.querySelector(".countdown-container").innerHTML = "<h2>THE CELEBRATION HAS STARTED!</h2>";
            }
        }, 1000);

        // WhatsApp Script
        document.getElementById('rsvpForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const attendance = document.getElementById('attendance').value;
            const guests = document.getElementById('guests').value;
            const phone = "972523626582";
            const message = `שלום! אני: ${name}%0Aסטטוס: ${attendance}%0Aכמות אנשים: ${guests}`;
            window.open(`https://wa.me/${phone}?text=${message}`, '_blank');
        });
    </script>
</body>
</html>
