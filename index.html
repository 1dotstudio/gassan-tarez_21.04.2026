<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gassan & Tarez Engagement</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --dark: #1a1a1a;
            --white: #ffffff;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: #f9f9f9;
            color: var(--dark);
            text-align: center;
            scroll-behavior: smooth;
        }

        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('img1.png') no-repeat center center/cover;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white;
        }

        .hero h1 {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(3rem, 12vw, 5rem);
            margin: 0;
            animation: fadeInUp 2s;
            padding: 0 16px;
        }

        .hero p {
            font-family: 'Cinzel', serif;
            font-size: clamp(0.8rem, 3.5vw, 1.5rem);
            letter-spacing: 3px;
            padding: 0 16px;
        }

        .hero > div {
            font-size: clamp(0.9rem, 3vw, 1.2rem) !important;
        }

        .section {
            padding: 20px 16px; /* צמצום משמעותי של ה-padding */
            max-width: 480px;
            margin: auto;
            width: 100%;
        }

        #countdown {
            display: flex;
            justify-content: center;
            gap: clamp(10px, 3vw, 20px); /* צמצום ה-gap */
            margin: 15px 0; /* צמצום מרווחים חיצוניים */
            padding: 20px 10px;
            font-family: 'Cinzel', serif;
            color: var(--gold);
            background-color: #111;
            border-radius: 8px;
        }

        .count-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: clamp(1.6rem, 6vw, 2.5rem);
            font-weight: bold;
            min-width: clamp(40px, 14vw, 70px);
        }

        .count-label {
            font-size: clamp(0.5rem, 1.8vw, 0.65rem);
            color: #999;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 4px;
        }

        .timeline {
            border-left: 2px solid var(--gold);
            margin: 20px auto; /* צמצום מרווח עליון ותחתון */
            width: fit-content;
            text-align: left;
            padding-left: 30px;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 20px; /* צמצום מרווח בין פריטים */
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -37px;
            top: 5px;
            width: 12px;
            height: 12px;
            background: var(--gold);
            border-radius: 50%;
        }

        .venue-section {
            background-color: #f9f9f9;
            max-width: 480px;
            padding: 20px 16px; /* צמצום padding */
        }

        .logoCH {
            max-width: min(200px, 55vw); /* הקטנת המקסימום של הלוגו */
            margin: 5px 0;
        }

        .rsvp-form {
            background: white;
            padding: 24px 20px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            direction: rtl;
            text-align: right;
        }

        .rsvp-form label {
            display: block;
            font-size: 0.85rem;
            color: #555;
            margin-top: 16px;
            margin-bottom: 4px;
        }

        .rsvp-form input,
        .rsvp-form select {
            width: 100%;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
            font-family: 'Montserrat', sans-serif;
        }

        .rsvp-form button {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background-color: var(--gold);
            color: white;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            letter-spacing: 1px;
            transition: background-color 0.2s ease;
        }

        iframe {
            width: 100%;
            height: 350px;
            border: 0;
            border-radius: 10px;
            margin-top: 15px;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="hero">
        <h1>Gassan & Tarez</h1>
        <p>ARE GETTING ENGAGED</p>
        <div style="font-size: 1.2rem; margin-top: 20px;">21.04.2026<br>Tuesday | 19:00</div>
    </div>

    <div class="section">
        <h2 style="font-family: 'Cinzel'; margin-bottom: 10px;">ENGAGEMENT DAY</h2>
        <div class="timeline">
            <div class="timeline-item">
                <strong>19:00 - 20:30</strong><br>
                Warm-up with <strong>DJ Set</strong>
            </div>
            <div class="timeline-item">
                <strong>20:30 - Late</strong><br>
                Main Event with <a href="https://www.instagram.com/alaa_akr/" style="color: var(--gold); text-decoration: none;"><strong>Alaa Akar</strong></a>
            </div>
        </div>

        <div id="countdown">
            <div class="count-item"><span id="days">00</span><span class="count-label">Days</span></div>
            <div class="count-item"><span id="hours">00</span><span class="count-label">Hours</span></div>
            <div class="count-item"><span id="minutes">00</span><span class="count-label">Mins</span></div>
            <div class="count-item"><span id="seconds">00</span><span class="count-label">Secs</span></div>
        </div>
    </div>

    <div class="section venue-section">
        <img src="LogoCH.png" alt="Venue Logo" class="logoCH">
        <h3 style="color: var(--dark); font-family: 'Cinzel', serif; letter-spacing: 3px; margin: 10px 0;">The Venue</h3>
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3348.835821568297!2d34.98555249999999!3d32.823194299999995!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x151dba4c6551b96f%3A0x6a0a09e0802c659e!2z16vXqNeRINek16jXpSDXl9mZ16XXqiAzLCDXl9mZ16TXlA!5e0!3m2!1siw!2sil!4v1712671500000!5m2!1siw!2sil" title="Venue Map" loading="lazy"></iframe>
    </div>

    <div class="section">
        <h2 style="font-family: 'Cinzel'; margin-bottom: 5px;">We can't wait to celebrate!</h2>
        <p style="margin-bottom: 20px;">Kindly complete the RSVP form below.</p>

        <div class="rsvp-form" id="rsvpForm">
            <label for="name">الاسم الكامل / שם מלא *</label>
            <input type="text" id="name" required placeholder="أدخل اسمك الكامل">

            <label for="attendance">هل ستتمكن من الحضور؟ / האם תגיע/י? *</label>
            <select id="attendance" required>
                <option value="כן, אני מגיע/ה">نعم، سأحضر / כן, אני מגיע/ה</option>
                <option value="לצערי לא אוכל להגיע">آسف، لن أتمكن / לצערי לא אוכל להגיע</option>
            </select>

            <label for="guests">عدد الأشخاص / כמות אנשים</label>
            <input type="number" id="guests" min="1" value="1">

            <button type="button" onclick="submitRSVP()">إرسال / שלח</button>
        </div>
    </div>

    <div class="section">
        <img src="final_design.png" alt="Design" style="width: 100%;">
    </div>

    <script>
        // Countdown
        const targetDate = new Date("April 21, 2026 19:00:00").getTime();

        const timer = setInterval(function () {
            const now = new Date().getTime();
            const diff = targetDate - now;

            if (diff < 0) {
                clearInterval(timer);
                document.getElementById("countdown").innerHTML = "<span style='font-size:1.5rem;'>🎉 IT'S TIME!</span>";
                return;
            }

            document.getElementById("days").innerHTML    = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById("hours").innerHTML   = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("minutes").innerHTML = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById("seconds").innerHTML = Math.floor((diff % (1000 * 60)) / 1000);
        }, 1000);

        // WhatsApp RSVP
        function submitRSVP() {
            const name       = document.getElementById('name').value.trim();
            const attendance = document.getElementById('attendance').value;
            const guests     = document.getElementById('guests').value;

            if (!name) {
                alert('נא להזין שם מלא / الرجاء إدخال الاسم');
                return;
            }

            const phone   = "972523626582";
            const message = encodeURIComponent(`שלום! אני: ${name}\n${attendance}\nכמות אנשים: ${guests}`);
            window.open(`https://wa.me/${phone}?text=${message}`, '_blank');
        }
    </script>
</body>
</html>
