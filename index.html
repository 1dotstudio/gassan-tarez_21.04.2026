<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gassan & Tarez Engagement</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --dark: #1a1a1a;
            --white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: #f9f9f9;
            color: var(--dark);
            text-align: center;
            scroll-behavior: smooth;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('img1.png') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            position: relative;
        }

        .hero h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 5rem;
            margin: 0;
            animation: fadeInUp 2s ease-out;
        }

        .hero p {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            letter-spacing: 3px;
            margin-top: 10px;
        }

        /* Timeline & Countdown */
        .section {
            padding: 80px 20px;
            max-width: 800px;
            margin: auto;
        }

        .timeline {
            border-left: 2px solid var(--gold);
            margin: 40px auto;
            width: fit-content;
            text-align: left;
            padding-left: 30px;
        }

        .timeline-item {
            position: relative;
            margin-bottom: 30px;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -37px;
            top: 5px;
            width: 12px;
            height: 12px;
            background: var(--gold);
            border-radius: 50%;
        }

        /* RSVP Form */
        .rsvp-form {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            direction: rtl;
        }

        input, select, button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: 'Montserrat', sans-serif;
        }

        button {
            background-color: var(--gold);
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #a38445;
        }

        .venue-logo {
            max-width: 150px;
            margin-bottom: 20px;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        iframe {
            width: 100%;
            height: 300px;
            border: 0;
            border-radius: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="hero">
        <h1>Gassan & Tarez</h1>
        <p>ARE GETTING ENGAGED</p>
        <div style="font-size: 1.2rem; margin-top: 20px;">
            21.04.2026<br>
            Tuesday | 19:00
        </div>
    </div>

    <div class="section">
        <h2 style="font-family: 'Cinzel';">ENGAGEMENT DAY</h2>
        <div class="timeline">
            <div class="timeline-item">
                <strong>19:00 - 20:30</strong><br>
                Warm-up with <strong>DJ Set</strong>
            </div>
            <div class="timeline-item">
                <strong>20:30 - Late</strong><br>
                Main Event with <a href="https://www.instagram.com/alaa_akr/" style="color: var(--gold); text-decoration: none;"><strong>Alaa Akar</strong></a>
            </div>
        </div>
    </div>

    <div class="section">
        <img src="img2.png" alt="Couples" style="width: 100%; border-radius: 10px;">
        <div style="margin-top: 50px;">
            <img src="logoCH.png" alt="Venue Logo" class="venue-logo">
            <h3>The Venue</h3>
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3348.1!2d34.9!3d32.8!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMzLCsDQ4JzAwLjAiTiAzNMKwNTQnMDAuMCJF!5e0!3m2!1sen!2sil!4v123456789"></iframe>
        </div>
    </div>

    <div class="section">
        <h2 style="font-family: 'Cinzel';">We can’t wait to celebrate together!</h2>
        <p>Kindly complete the RSVP form below. We’d love to hear from you!</p>
        
        <form class="rsvp-form" id="rsvpForm">
            <label>الاسم الكامل *</label>
            <input type="text" id="name" required placeholder="הכנס שם מלא">
            
            <label>هل ستتمكن/ين من الحضور؟ *</label>
            <select id="attendance" required>
                <option value="כן, אני מגיע/ה">כן, אני מגיע/ה</option>
                <option value="לצערי לא אוכל להגיע">לצערי לא אוכל להגיע</option>
            </select>

            <label>عدد الأشخاص (כמות אנשים)</label>
            <input type="number" id="guests" min="1" value="1">

            <button type="submit">Submit / إرسال</button>
        </form>
    </div>

    <div class="section">
        <img src="final_design.png" alt="Design" style="width: 100%;">
    </div>

    <script>
        document.getElementById('rsvpForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const attendance = document.getElementById('attendance').value;
            const guests = document.getElementById('guests').value;
            const phone = "972523626582";

            const message = `שלום! אני: ${name}%0A${attendance}%0Aכמות אנשים: ${guests}`;
            const whatsappUrl = `https://wa.me/${phone}?text=${message}`;
            
            window.open(whatsappUrl, '_blank');
        });
    </script>

</body>
</html>
